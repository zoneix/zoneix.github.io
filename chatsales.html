    <script type="text/javascript">
        var PROTOCOL = "https"
        var IP = "mm.ccone.net";
        var PORT = 443;
        var EXCEPTION_MESSAGE = 'Unable to process your request.';
        var SHOW_EXCEPTION_DETAILS = false;
        var dataArr = [];
        var chatAPI = new ThinConnectChat(PROTOCOL, IP, PORT, EXCEPTION_MESSAGE, SHOW_EXCEPTION_DETAILS);

        window.onload = function () {
            //alert("onload called");
            //chatAPI.loadReasons();
            chatAPI.checkAutoSubmit();
        }
        function submit() {
            var jsonData = null;
            dataArr = [];
            //var customerName = document.getElementById('custname').value;
			var customerName = "Carl Thomas";
            chatAPI.getParam('custname', customerName);

            if (validateCustomerName(customerName)) {
                //var mobileNumber = document.getElementById('mobilenum').value;
				var mobileNumber = "9198416890";
                chatAPI.getParam('mobilenum', mobileNumber);

                if (validateMobileNumber(mobileNumber)) {
                    //var emailAddress = document.getElementById('emailid').value;
					var emailAddress = "cthomas@cumulus.com";
                    if (validateEmailAddress(emailAddress)) {
                        chatAPI.getParam('emailid', emailAddress);

                        //var question = document.getElementById('question').value;
						var question = "Can I get a sales rep to help me with a finance quote?";

                        if (validateQuestion(question)) {
                            chatAPI.getParam('question', question);
							//hardcoding which chat queue we go to
                            var reason = "546";
							//console.log(document.getElementById('reason').value);
                            var sendtranscript = "false";
                            chatAPI.getParam('reason', reason);
                       
                            chatAPI.getParam('sendtranscript', sendtranscript);


                            chatAPI.getParam('CUSTOM_MESSAGE', EXCEPTION_MESSAGE);
                            chatAPI.getParam('SHOW_EXCEPTION_DETAILS', SHOW_EXCEPTION_DETAILS);
                            chatAPI.getParam('REQUEST-ID', 0);
                            chatAPI.getHiddenParam();
                            console.log("dataArr=" + dataArr);
                            chatAPI.submit(dataArr);

                        }
                    }
                }
            }
			
			window.close();

        }

        // Validation method for Customer name
        function validateCustomerName(customerName) {
            var isValidCustomerName = false;

            // Validate the Customer name as per businness logic
            // and set the value to true if it meets the logic.
            isValidCustomerName = true;

            return isValidCustomerName;
        }

        // Validation method for Mobile number
        function validateMobileNumber(mobileNumber) {
            var isValidMobileNumber = false;

            // Validate the Mobile Number as per businness logic
            // and set the value to true if it meets the logic.
            isValidMobileNumber = true;

            return isValidMobileNumber;
        }

        // Validation method for Email Address
        function validateEmailAddress(emailAddress) {
            var isValidEmailAddress = false;

            // Validate the Email Address as per businness logic
            // and set the value to true if it meets the logic.
            isValidEmailAddress = true;

            return isValidEmailAddress;
        }

        // Validation method for Question
        function validateQuestion(question) {
            var isValidQuestion = false;

            // Validate the Mobile Number as per businness logic
            // and set the value to true if it meets the logic.
            isValidQuestion = true;

            return isValidQuestion;
        }
    </script>
